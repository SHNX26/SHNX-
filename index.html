        body {

        header { 
            position: fixed; top: 0; width: 100%; height: 70px; z-index: 1000; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 5%; box-sizing: border-box; 
            backdrop-filter: blur(2px);
        }
        .logo { font-size: 28px; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px rgba(229, 9, 20, 0.4); letter-spacing: 1px;}

        /* ستايل شريط البحث المطور */
        .search-box {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 8px 15px; color: white; width: 140px; 
            outline: none; transition: var(--transition); font-family: inherit;
            backdrop-filter: blur(5px);
        }
        .search-box:focus { width: 190px; background: rgba(0,0,0,0.6); border-color: var(--accent); box-shadow: 0 0 10px rgba(229,9,20,0.3); }
        .search-box::placeholder { color: #ccc; }

        /* ستايل زر التيليجرام */
        .tg-fab { 
            position: fixed; bottom: 25px; left: 20px; z-index: 1000;
            background: #0088cc; color: white; padding: 12px 20px; 
            border-radius: 30px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
            display: flex; align-items: center; gap: 8px; transition: var(--transition);
        }
        .tg-fab:active { transform: scale(0.9); }

        .hero { 
            height: 75vh; position: relative; 
            background-size: cover; background-position: center top; 
            display: flex; align-items: flex-end; 
            transition: background-image 0.5s ease-in-out;
        }
        .hero::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg) 5%, rgba(0,0,0,0.5) 40%, rgba(0,0,0,0.2) 100%); 
        }
        .hero-content { position: relative; z-index: 2; padding: 40px 5%; width: 100%; text-align: center; }
        .btn-play-hero { 
            background: #fff; color: #000; border: none; padding: 14px 40px; 
            border-radius: 4px; font-weight: 900; font-size: 16px; 
            cursor: pointer; transition: var(--transition); 
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-play-hero:hover { background: #e6e6e6; transform: scale(1.05); }
        .btn-play-hero:active { transform: scale(0.95); opacity: 0.8; }

        .section-title { font-size: 20px; font-weight: 800; margin: 30px 5% 15px; border-right: 4px solid var(--accent); padding-right: 12px; }
        .scroll-list { display: flex; overflow-x: auto; padding: 10px 5% 30px; gap: 15px; scrollbar-width: none; }
        .scroll-list::-webkit-scrollbar { display: none; }
        
        /* تأثيرات نتفليكس على الكروت */
        .card { 
            min-width: 130px; position: relative; cursor: pointer; 
            border-radius: 6px; transition: var(--transition);
            transform-origin: center;
        }
        .card img { 
            width: 100%; height: 190px; border-radius: 6px; object-fit: cover; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: var(--transition);
        }
        
        /* غطاء أسود يظهر عند اللمس/التمرير */
        .card::after {
            content: ''; position: absolute; inset: 0; border-radius: 6px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
            opacity: 0; transition: var(--transition);
        }
        .card:hover, .card:active { transform: scale(1.08); z-index: 10; }
        .card:hover::after, .card:active::after { opacity: 1; }
        .card:hover img, .card:active img { box-shadow: 0 10px 20px rgba(0,0,0,0.8); }

        .continue-card { min-width: 200px; }
        .continue-card img { height: 120px; opacity: 0.8; }

        #details-page { display: none; position: fixed; inset: 0; z-index: 2000; background: var(--bg); overflow-y: auto; }
        #video-container { display: none; width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 2100; box-shadow: 0 5px 20px rgba(0,0,0,0.9); }

        .close-btn:active { transform: scale(0.9); background: var(--accent); border-color: var(--accent); }

        const sheetName = "Sheet1"; 
        const sheetURL = `https://opensheet.elk.sh/${sheetID}/${sheetName}`;

                // 1. تشغيل واجهة الموقع فوراً بدون أي انتظار
        renderHome();

        // 2. تحديث الحلقات الجديدة في الخلفية بصمت
        async function loadEpisodesSilently() {
            try {
                const response = await fetch(sheetURL);
                if (response.ok) {
                    const data = await response.json();
                    data.forEach(row => {
                        if (row.series && row.episode && row.link) {
                            if (!linksDB[row.series]) {
                                linksDB[row.series] = {};
                            }
                            // تحديث الرابط بصمت
                            linksDB[row.series][row.episode] = row.link;
                        }
                    });
                    console.log("✅ تم جلب الحلقات وتحديثها في الخلفية");
                }
            } catch (error) {
                console.error("❌ فشل سحب الحلقات في الخلفية", error);
            }
        }

        // استدعاء دالة التحديث الصامت
        loadEpisodesSilently();


        function renderHome() {
            // إعداد البوستر الرئيسي
            document.getElementById('hero-section').style.backgroundImage = `url('${currentHero.img}')`;
            document.getElementById('hero-title').innerText = currentHero.name;
            document.getElementById('hero-meta').innerText = currentHero.meta;
            document.getElementById('hero-btn').onclick = () => openDetails(currentHero.name);

            // إعداد قوائم المسلسلات
            seriesDB.forEach(s => {
                let listId = s.cat === "trending" ? "list-trending" : (s.cat === "comedy" ? "list-comedy" : "list-drama");
                let container = document.getElementById(listId);
                let card = document.createElement('div');
                card.className = "card";
                card.onclick = () => openDetails(s.name);
                card.innerHTML = `<img src="${s.img}" alt="${s.name}">`;
                container.appendChild(card);
            });
            checkContinueWatching();
        }

        function checkContinueWatching() {
            const data = localStorage.getItem('shnx_continue');
            const section = document.getElementById('continue-section');
            const list = document.getElementById('list-continue');
            
            if (data) {
                const item = JSON.parse(data);
                section.style.display = 'block';
                list.innerHTML = `
                    <div class="card continue-card" onclick="continueWatchingPlay('${item.name}', ${item.ep}, '${item.link}')">
                        <img src="${item.img}">
                        <div style="position: absolute; bottom: 10px; right: 10px; left: 10px; z-index: 2;">
                            <span style="background: var(--accent); padding: 3px 8px; border-radius: 4px; font-size: 11px;">الحلقة ${item.ep}</span>
                            <div style="font-weight: bold; margin-top: 5px; text-shadow: 0 2px 4px #000;">${item.name}</div>
                        </div>
                    </div>
                `;
            } else {
                section.style.display = 'none';
            }
        }

        function continueWatchingPlay(name, ep, link) {
            openDetails(name);
            setTimeout(() => {
                const epItems = document.querySelectorAll('#d-episodes-list .ep-item');
                let el = epItems.length >= ep ? epItems[ep - 1] : null;
                playVideo(link, el, ep, name);
            }, 100);
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const mainCat = document.getElementById('main-categories');
            const hero = document.getElementById('hero-section');
            const searchSec = document.getElementById('search-section');
            const searchList = document.getElementById('list-search');

            if(q.length > 0) {
                mainCat.style.display = 'none';
                hero.style.display = 'none';
                searchSec.style.display = 'block';
                
                searchList.innerHTML = '';
                const results = seriesDB.filter(s => s.name.toLowerCase().includes(q));
                
                if(results.length > 0) {
                    results.forEach(s => {
                        let card = document.createElement('div');
                        card.className = "card";
                        card.style.marginBottom = "15px";
                        card.onclick = () => openDetails(s.name);
                        card.innerHTML = `<img src="${s.img}" alt="${s.name}">`;
                        searchList.appendChild(card);
                    });
                } else {
                    searchList.innerHTML = '<p style="color: var(--text-sec); width: 100%; text-align: center;">لا توجد نتائج مطابقة...</p>';
                }
            } else {
                mainCat.style.display = 'block';
                hero.style.display = 'flex';
                searchSec.style.display = 'none';
                checkContinueWatching();
            }
        }

        function openDetails(name) {
            const data = seriesDB.find(s => s.name === name);
            const page = document.getElementById('details-page');
            
            document.getElementById('d-title').innerText = data.name;
            document.getElementById('d-desc').innerText = data.desc;
            document.getElementById('d-hero').style.backgroundImage = `url('${data.img}')`;
            
            // حقن التصنيفات (سنة الإنتاج والنوع)
            document.getElementById('d-meta').innerHTML = `
                <span class="meta-year">${data.year}</span>
                <span class="meta-tag">${data.genre}</span>
                <span class="meta-tag">1080p HD</span>
            `;

            document.getElementById('video-container').style.display = 'none';
            document.getElementById('d-hero').style.display = 'block';
            document.getElementById('d-info-box').classList.remove('video-mode');
            
            renderEpisodes(name);
            
            page.style.display = 'block';
            page.classList.add('fade-in');
            document.body.style.overflow = 'hidden';
        }

        function renderEpisodes(name) {
            const container = document.getElementById('d-episodes-list');
            container.innerHTML = "";
            
            const epData = linksDB[name] || {};
            // نحدد أعلى رقم حلقة موجودة، أو نفترض 30 حلقة كحد أقصى لرمضان
            let maxEp = 30;
            const existingEps = Object.keys(epData).map(Number);
            if(existingEps.length > 0) {
                maxEp = Math.max(30, ...existingEps); 
            }

            for (let i = 1; i <= maxEp; i++) {
                const link = epData[i];
                const item = document.createElement('div');
                item.className = "ep-item";
                item.style.opacity = link ? "1" : "0.4";
                item.innerHTML = `
                    <div class="ep-number">${i}</div>
                    <div>
                        <div style="font-weight: bold;">الحلقة ${i}</div>
                        <div style="font-size: 12px; color: ${link ? 'var(--accent)' : 'var(--text-sec)'};">${link ? 'شاهد الآن' : 'قريباً'}</div>
                    </div>
                `;
                if(link) item.onclick = () => playVideo(link, item, i, name);
                container.appendChild(item);
            }
        }

        function playVideo(url, el, epNum, seriesName) {
            document.getElementById('d-hero').style.display = 'none';
            const container = document.getElementById('video-container');
            container.style.display = 'block';
            document.getElementById('video-frame').src = url;
            document.getElementById('d-info-box').classList.add('video-mode');
            
            document.querySelectorAll('.ep-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            
            document.getElementById('details-page').scrollTo({top: 0, behavior: 'smooth'});

            if(seriesName && epNum) {
                const seriesData = seriesDB.find(s => s.name === seriesName);
                localStorage.setItem('shnx_continue', JSON.stringify({
                    name: seriesName,
                    img: seriesData.img,
                    ep: epNum,
                    link: url
                }));
                checkContinueWatching();
            }
        }

        function closeDetails() {
            document.getElementById('video-frame').src = "";
            document.getElementById('details-page').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

    </script> 
    
</body>
</html>
