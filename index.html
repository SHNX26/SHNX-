<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SHNX | منصة المشاهدة الأولى</title>

    <style>
        :root {
            --bg: #050505;
            --surface: #141414;
            --accent: #E50914;
            --text: #ffffff;
            --text-sec: #b3b3b3;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, system-ui, Roboto, sans-serif; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .fade-in { animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { 
            position: fixed; top: 0; width: 100%; height: 70px; z-index: 1000; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 5%; box-sizing: border-box; 
        }
        .logo { font-size: 28px; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px rgba(229, 9, 20, 0.4); }

        /* ستايل شريط البحث */
        .search-box {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 8px 15px; color: white; width: 140px; 
            outline: none; transition: var(--transition); font-family: inherit;
        }
        .search-box:focus { width: 190px; background: rgba(255,255,255,0.25); border-color: var(--accent); }
        .search-box::placeholder { color: #bbb; }

        /* ستايل زر التيليجرام */
        .tg-fab { 
            position: fixed; bottom: 25px; left: 20px; z-index: 1000;
            background: #0088cc; color: white; padding: 12px 20px; 
            border-radius: 30px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
            display: flex; align-items: center; gap: 8px; transition: var(--transition);
        }
        .tg-fab:active { transform: scale(0.9); }

        .hero { 
            height: 75vh; position: relative; 
            background-image: url('https://i.ibb.co/hJTvQBRJ/20260216-133106.jpg'); 
            background-size: cover; background-position: center top; 
            display: flex; align-items: flex-end; 
        }
        .hero::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg) 10%, rgba(0,0,0,0.4) 50%, transparent 100%); 
        }
        .hero-content { position: relative; z-index: 2; padding: 40px 5%; width: 100%; text-align: center; }
        .btn-play-hero { 
            background: #fff; color: #000; border: none; padding: 14px 40px; 
            border-radius: 4px; font-weight: 900; font-size: 16px; 
            cursor: pointer; transition: var(--transition); 
        }
        .btn-play-hero:active { transform: scale(0.95); opacity: 0.8; }

        .section-title { font-size: 19px; font-weight: 800; margin: 25px 5% 15px; border-right: 4px solid var(--accent); padding-right: 12px; }
        .scroll-list { display: flex; overflow-x: auto; padding: 0 5% 30px; gap: 15px; scrollbar-width: none; }
        .scroll-list::-webkit-scrollbar { display: none; }
        
        .card { min-width: 130px; transition: var(--transition); position: relative; cursor: pointer; }
        .card:active { transform: scale(0.92); }
        .card img { width: 100%; height: 190px; border-radius: 6px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* تنسيق بطاقة إكمال المشاهدة لتكون أعرض */
        .continue-card { min-width: 200px; }
        .continue-card img { height: 120px; opacity: 0.7; }

        #details-page { display: none; position: fixed; inset: 0; z-index: 2000; background: var(--bg); overflow-y: auto; }
        #video-container { display: none; width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 2100; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        #video-container iframe { width: 100%; height: 100%; border: none; }

        .details-hero { height: 50vh; background-size: cover; background-position: center; position: relative; }
        .details-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg), transparent); }

        /* تعديل زر الإغلاق: نقلناه لليسار (left) عشان ما يغطي على اعدادات الجودة حق المشغل */
        .close-btn { 
            position: fixed; top: 20px; left: 20px; z-index: 2200; 
            background: rgba(0,0,0,0.6); color: white; border: none; 
            width: 40px; height: 40px; border-radius: 50%; font-size: 20px; 
            backdrop-filter: blur(10px); cursor: pointer;
        }

        .details-info { padding: 0 5%; transition: var(--transition); transform: translateY(-60px); }
        .details-info.video-mode { transform: translateY(10px); }

        .ep-item { display: flex; align-items: center; background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 12px; gap: 15px; border: 1px solid #222; transition: var(--transition); cursor: pointer;}
        .ep-item:active { background: #252525; transform: translateX(-5px); }
        .ep-item.active { border-color: var(--accent); background: rgba(229, 9, 20, 0.1); }
        .ep-number { width: 40px; height: 40px; background: #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .active .ep-number { background: var(--accent); }
    </style>
</head>

        function renderHome() {
            seriesDB.forEach(s => {
                let listId = s.cat === "trending" ? "list-trending" : (s.cat === "comedy" ? "list-comedy" : "list-drama");
                let container = document.getElementById(listId);
                let card = document.createElement('div');
                card.className = "card";
                card.onclick = () => openDetails(s.name);
                card.innerHTML = `<img src="${s.img}" alt="${s.name}">`;
                container.appendChild(card);
            });
            checkContinueWatching();
        }

        function checkContinueWatching() {
            const data = localStorage.getItem('shnx_continue');
            const section = document.getElementById('continue-section');
            const list = document.getElementById('list-continue');
            
            if (data) {
                const item = JSON.parse(data);
                section.style.display = 'block';
                list.innerHTML = `
                    <div class="card continue-card" onclick="continueWatchingPlay('${item.name}', ${item.ep}, '${item.link}')">
                        <img src="${item.img}">
                        <div style="position: absolute; bottom: 10px; right: 10px; left: 10px;">
                            <span style="background: var(--accent); padding: 3px 8px; border-radius: 4px; font-size: 11px;">الحلقة ${item.ep}</span>
                            <div style="font-weight: bold; margin-top: 5px; text-shadow: 0 2px 4px #000;">${item.name}</div>
                        </div>
                    </div>
                `;
            } else {
                section.style.display = 'none';
            }
        }

        // تشغيل مباشر من إكمال المشاهدة
        function continueWatchingPlay(name, ep, link) {
            openDetails(name);
            setTimeout(() => {
                const epItems = document.querySelectorAll('#d-episodes-list .ep-item');
                let el = epItems.length >= ep ? epItems[ep - 1] : null;
                playVideo(link, el, ep, name);
            }, 100);
        }

        function handleSearch() {

                mainCat.style.display = 'none';

                searchSec.style.display = 'block';
                
                searchList.innerHTML = '';
                const results = seriesDB.filter(s => s.name.toLowerCase().includes(q));
                
                if(results.length > 0) {
                    results.forEach(s => {
                        let card = document.createElement('div');
                        card.className = "card";
                        card.style.marginBottom = "15px";
                        card.onclick = () => openDetails(s.name);
                        card.innerHTML = `<img src="${s.img}" alt="${s.name}">`;
                        searchList.appendChild(card);
                    });
                } else {
                    searchList.innerHTML = '<p style="color: var(--text-sec); width: 100%; text-align: center;">لا توجد نتائج مطابقة...</p>';
                }
            } else {
                mainCat.style.display = 'block';
                hero.style.display = 'flex';
                searchSec.style.display = 'none';
                checkContinueWatching();
            }
        }

        function openDetails(name) {
            const data = seriesDB.find(s => s.name === name);
            const page = document.getElementById('details-page');
            document.getElementById('d-title').innerText = data.name;
            document.getElementById('d-desc').innerText = data.desc;
            document.getElementById('d-hero').style.backgroundImage = `url('${data.img}')`;
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('d-hero').style.display = 'block';
            document.getElementById('d-info-box').classList.remove('video-mode');
            renderEpisodes(name);
            page.style.display = 'block';
            page.classList.add('fade-in');
            document.body.style.overflow = 'hidden';
        }

        function renderEpisodes(name) {
            const container = document.getElementById('d-episodes-list');
            container.innerHTML = "";
            
            const epData = linksDB[name] || {};
            const totalEpisodes = Object.keys(epData).length || 30;

            for (let i = 1; i <= totalEpisodes; i++) {
                const link = epData[i];
                const item = document.createElement('div');
                item.className = "ep-item";
                item.style.opacity = link ? "1" : "0.3";
                item.innerHTML = `
                    <div class="ep-number">${i}</div>
                    <div>
                        <div style="font-weight: bold;">الحلقة ${i}</div>
                        <div style="font-size: 12px; color: var(--accent);">${link ? 'شاهد الآن' : 'قريباً'}</div>
                    </div>
                `;
                // تمرير رقم الحلقة واسم المسلسل لدالة التشغيل
                if(link) item.onclick = () => playVideo(link, item, i, name);
                container.appendChild(item);
            }
        }

        function playVideo(url, el, epNum, seriesName) {
            document.getElementById('d-hero').style.display = 'none';
            const container = document.getElementById('video-container');
            container.style.display = 'block';
            document.getElementById('video-frame').src = url;
            document.getElementById('d-info-box').classList.add('video-mode');
            
            document.querySelectorAll('.ep-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            
            document.getElementById('details-page').scrollTo({top: 0, behavior: 'smooth'});

            // حفظ بيانات المشاهدة في الذاكرة
            if(seriesName && epNum) {
                const seriesData = seriesDB.find(s => s.name === seriesName);
                localStorage.setItem('shnx_continue', JSON.stringify({
                    name: seriesName,
                    img: seriesData.img,
                    ep: epNum,
                    link: url
                }));
                checkContinueWatching();
            }
        }

        function closeDetails() {
            document.getElementById('video-frame').src = "";
            document.getElementById('details-page').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        renderHome();
    </script> 
    
</body>
</html>
